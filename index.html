<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Qwen Chat Agent</title>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.6/dist/purify.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js/lib/common.min.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js/styles/github-dark.min.css">

  <style>
    :root {
      --bg: #343541;
      --panel: #202123;
      --panel-2: #40414f;
      --border: #4d4d4f;
      --text: #ececf1;
      --muted: #9ca3af;
      --accent: #10a37f;
      --accent-hover: #1a7f64;
      --user: #0b93f6;
      --ai: #444654;
      --shadow: 0 0 15px rgba(0,0,0,0.1);
    }

    * { 
      box-sizing: border-box; 
    }

    /* Custom Scrollbar configuration */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: #565869;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #737588;
    }

    html, body {
      height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    }

    body {
      display: grid;
      grid-template-columns: 280px 1fr;
      height: 100vh;
    }

    /* Sidebar Styling */
    .sidebar {
      background: var(--panel);
      display: flex;
      flex-direction: column;
      box-shadow: 2px 0 5px rgba(0,0,0,0.2);
      z-index: 10;
    }

    .sidebar-header {
      padding: 20px;
    }

    .new-chat {
      width: 100%;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 8px;
      padding: 12px 14px;
      background: transparent;
      color: white;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.2s ease;
    }

    .new-chat:hover {
      background: rgba(255,255,255,0.1);
    }

    .chat-list {
      overflow-y: auto;
      padding: 0 12px 12px;
      flex: 1;
    }

    .chat-item {
      padding: 14px;
      border-radius: 8px;
      cursor: pointer;
      margin-bottom: 8px;
      background: transparent;
      border: 1px solid transparent;
      transition: background 0.2s ease;
    }

    .chat-item:hover {
      background: rgba(255,255,255,0.05);
    }

    .chat-item.active {
      background: var(--panel-2);
      border-color: rgba(255,255,255,0.1);
    }

    .chat-title {
      font-weight: 500;
      font-size: 14px;
      margin-bottom: 6px;
    }

    .chat-preview {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Main Content Styling */
    .main {
      display: grid;
      grid-template-rows: 1fr auto;
      min-width: 0;
      position: relative;
    }

    .messages {
      overflow-y: auto;
      padding: 24px 0 40px;
      scroll-behavior: smooth;
    }

    .message-row {
      width: 100%;
      display: flex;
      justify-content: center;
      padding: 24px 0;
      border-bottom: 1px solid rgba(255,255,255,0.02);
    }

    .message-row:nth-child(even) {
      background: rgba(255,255,255,0.02);
    }

    .message {
      width: min(800px, calc(100% - 40px));
      line-height: 1.7;
      font-size: 15px;
      white-space: normal;
      overflow-wrap: anywhere;
    }

    .message.user {
      display: flex;
      justify-content: flex-end;
    }

    .message.user .content-wrapper {
      background: var(--panel-2);
      padding: 12px 20px;
      border-radius: 18px;
      border-bottom-right-radius: 4px;
      max-width: 80%;
    }

    .message.assistant .content-wrapper {
      padding: 0 10px;
    }

    /* Composer Styling */
    .composer-wrap {
      background: linear-gradient(180deg, rgba(52,53,65,0) 0%, var(--bg) 50%);
      padding: 24px;
      position: sticky;
      bottom: 0;
    }

    .composer {
      width: min(800px, calc(100% - 32px));
      margin: 0 auto;
      display: flex;
      gap: 12px;
      align-items: flex-end;
      background: var(--panel-2);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 12px 16px;
      box-shadow: var(--shadow);
      transition: border-color 0.2s;
    }

    .composer:focus-within {
      border-color: rgba(255,255,255,0.3);
    }

    textarea {
      flex: 1;
      resize: none;
      border: 0;
      outline: none;
      background: transparent;
      color: var(--text);
      font-family: inherit;
      font-size: 15px;
      line-height: 1.5;
      max-height: 200px;
      min-height: 24px;
      padding: 4px 0;
    }

    textarea::placeholder {
      color: #8e8ea0;
    }

    .send-btn {
      border: 0;
      border-radius: 8px;
      padding: 10px 18px;
      background: var(--accent);
      color: white;
      font-weight: 600;
      cursor: pointer;
      min-width: 80px;
      height: 38px;
      transition: background 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .send-btn:hover:not(:disabled) {
      background: var(--accent-hover);
    }

    .send-btn:disabled,
    .new-chat:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* Formatting Content Elements */
    pre {
      overflow: auto;
      border-radius: 8px;
      padding: 16px;
      background: #0d1117;
      margin: 16px 0;
      border: 1px solid rgba(255,255,255,0.1);
    }

    code {
      font-family: "Fira Code", ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 13px;
    }

    p { margin-top: 0; }

    .empty {
      width: min(800px, calc(100% - 32px));
      margin: 40px auto;
      color: var(--muted);
      text-align: center;
      padding: 48px 24px;
      border: 2px dashed rgba(255,255,255,0.1);
      border-radius: 12px;
      background: rgba(255,255,255,0.02);
    }

    .empty-title {
      font-size: 20px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 8px;
    }

    @media (max-width: 768px) {
      body {
        grid-template-columns: 1fr;
      }
      .sidebar {
        display: none;
      }
      .message.user .content-wrapper {
        max-width: 95%;
      }
    }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-header">
      <button id="newChatBtn" class="new-chat">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        New Chat
      </button>
    </div>
    <div id="chatList" class="chat-list"></div>
  </aside>

  <main class="main">
    <section id="messages" class="messages">
      <div class="empty" id="emptyState">
        <div class="empty-title">Welcome to Qwen Agent</div>
        <div>Select a chat from the sidebar or start a new conversation.</div>
      </div>
    </section>

    <div class="composer-wrap">
      <div class="composer">
        <textarea id="prompt" placeholder="Tulis pesan... (Ctrl + Enter untuk kirim)" rows="1"></textarea>
        <button id="sendBtn" class="send-btn">
          Kirim
        </button>
      </div>
    </div>
  </main>

  <script>
    // System Initialization Configuration
    const API_BASE = "https://qwen.production-ai.opendnf.cloud/";

    const chatListEl = document.getElementById("chatList");
    const messagesEl = document.getElementById("messages");
    const emptyStateEl = document.getElementById("emptyState");
    const promptEl = document.getElementById("prompt");
    const sendBtn = document.getElementById("sendBtn");
    const newChatBtn = document.getElementById("newChatBtn");

    let chats = [];
    let activeChatId = localStorage.getItem("activeChatId") || "";
    let isSending = false;

    // Configure Markdown parser
    marked.setOptions({
      breaks: true,
      gfm: true
    });

    /**
     * Sanitizes raw HTML strings to prevent Cross-Site Scripting (XSS).
     */
    function escapeHtml(str) {
      return str
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    /**
     * Converts Markdown to sanitized HTML output.
     */
    function mdToHtml(text) {
      const html = marked.parse(text || "");
      return DOMPurify.sanitize(html);
    }

    /**
     * Ensures the chat window is scrolled to the latest message.
     */
    function scrollToBottom() {
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    /**
     * Dynamically adjusts the height of the textarea based on content.
     */
    function autoResize() {
      promptEl.style.height = "auto";
      promptEl.style.height = Math.min(promptEl.scrollHeight, 200) + "px";
    }

    /**
     * Executes API requests utilizing the configured base URL.
     */
    async function api(path, options = {}) {
      const res = await fetch(API_BASE + path, {
        ...options,
        headers: {
          "Content-Type": "application/json",
          ...(options.headers || {}),
        },
      });

      if (!res.ok) {
        const text = await res.text();
        console.error(`HTTP Request Error: ${res.status} - ${text}`);
        throw new Error(text || `HTTP ${res.status}`);
      }

      return await res.json();
    }

    /**
     * Renders the sidebar list of available chat sessions.
     */
    function renderChatList() {
      chatListEl.innerHTML = "";

      if (!chats.length) {
        chatListEl.innerHTML = '<div style="padding:16px;color:#9ca3af;font-size:14px;text-align:center;">No chat history available.</div>';
        return;
      }

      for (const chat of chats) {
        const item = document.createElement("div");
        item.className = "chat-item" + (chat.id === activeChatId ? " active" : "");
        item.innerHTML = `
          <div class="chat-title">${escapeHtml(chat.title || "New chat")}</div>
          <div class="chat-preview">${escapeHtml(chat.preview || "No messages yet.")}</div>
        `;
        item.addEventListener("click", () => openChat(chat.id));
        chatListEl.appendChild(item);
      }
    }

    /**
     * Renders the messages for the currently active chat session.
     */
    function renderMessages(messages) {
      messagesEl.innerHTML = "";

      if (!messages || !messages.length) {
        emptyStateEl.style.display = "block";
        messagesEl.appendChild(emptyStateEl);
        return;
      }

      emptyStateEl.style.display = "none";

      for (const msg of messages) {
        appendRenderedMessage(msg.role, msg.content);
      }

      scrollToBottom();
    }

    /**
     * Appends a new message node to the DOM and applies syntax highlighting.
     */
    function appendRenderedMessage(role, text) {
      const row = document.createElement("div");
      row.className = "message-row";

      const bubble = document.createElement("div");
      bubble.className = "message " + role;
      
      const wrapper = document.createElement("div");
      wrapper.className = "content-wrapper";
      wrapper.innerHTML = mdToHtml(text);

      bubble.appendChild(wrapper);
      row.appendChild(bubble);
      messagesEl.appendChild(row);

      requestAnimationFrame(() => hljs.highlightAll());
      scrollToBottom();

      return wrapper; // Return wrapper so pending text can be updated
    }

    /**
     * Fetches chat history from the remote server.
     */
    async function loadChats() {
      try {
        const data = await api("/api/chats");
        chats = data.chats || [];
        renderChatList();
      } catch (error) {
        console.error("Failed to load chat history:", error);
      }
    }

    /**
     * Opens a specific chat session based on the provided identifier.
     */
    async function openChat(chatId) {
      activeChatId = chatId;
      localStorage.setItem("activeChatId", chatId);

      try {
        const data = await api(`/api/chats/${chatId}/messages`);
        renderMessages(data.messages || []);
        renderChatList();
      } catch (error) {
        console.error("Failed to retrieve messages for chat session:", error);
      }
    }

    /**
     * Instantiates a new chat session.
     */
    async function createChat(title = "New chat") {
      try {
        const data = await api("/api/chats", {
          method: "POST",
          body: JSON.stringify({ title }),
        });

        const chat = data.chat;
        if (!chat) throw new Error("Failed to initialize a new chat session.");

        await loadChats();
        await openChat(chat.id);
      } catch (error) {
        console.error("Error creating new chat:", error);
      }
    }

    /**
     * Validates that an active chat session exists before message submission.
     */
    async function ensureActiveChat() {
      if (activeChatId) return;

      if (!chats.length) {
        await createChat();
        return;
      }

      await openChat(chats[0].id);
    }

    /**
     * Processes and transmits the user input to the backend server.
     */
    async function sendMessage() {
      const text = promptEl.value.trim();
      if (!text || isSending) return;

      await ensureActiveChat();

      isSending = true;
      sendBtn.disabled = true;
      newChatBtn.disabled = true;
      promptEl.disabled = true;

      promptEl.value = "";
      autoResize();

      appendRenderedMessage("user", text);
      const pendingBubble = appendRenderedMessage("assistant", "<div style='color:var(--muted); font-style:italic;'>Processing request...</div>");

      try {
        const data = await api(`/api/chats/${activeChatId}/messages`, {
          method: "POST",
          body: JSON.stringify({ prompt: text }),
        });

        pendingBubble.innerHTML = mdToHtml(data.assistant || "");
        requestAnimationFrame(() => hljs.highlightAll());

        await loadChats();
        await openChat(activeChatId);
      } catch (err) {
        pendingBubble.innerHTML = `<pre style="color:#ef4444; background:rgba(239, 68, 68, 0.1); border:1px solid #ef4444;">${escapeHtml(String(err?.message || err))}</pre>`;
        console.error("Transmission Failure:", err);
      } finally {
        isSending = false;
        sendBtn.disabled = false;
        newChatBtn.disabled = false;
        promptEl.disabled = false;
        promptEl.focus();
      }
    }

    // Event Listeners Registration
    newChatBtn.addEventListener("click", async () => {
      if (isSending) return;
      await createChat();
    });

    sendBtn.addEventListener("click", sendMessage);

    promptEl.addEventListener("input", autoResize);

    // Modified Event Listener: Enter now performs normal new line
    // Ctrl + Enter or Cmd + Enter executes message dispatch
    promptEl.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && (e.ctrlKey || e.metaKey)) {
        e.preventDefault();
        sendMessage();
      }
    });

    // Application Bootstrap Sequence
    (async function init() {
      try {
        await loadChats();

        if (activeChatId && chats.some((c) => c.id === activeChatId)) {
          await openChat(activeChatId);
        } else if (chats.length) {
          await openChat(chats[0].id);
        } else {
          // Initialize empty state rather than forcing a new API call immediately
          console.info("Application initialized with no active sessions.");
        }
      } catch (err) {
        messagesEl.innerHTML = `
          <div class="empty">
            <div style="color:#ef4444; font-weight:bold; margin-bottom:10px;">Application Initialization Error</div>
            <div style="color:var(--muted); font-size:14px;">${escapeHtml(String(err?.message || err))}</div>
          </div>
        `;
        console.error("Bootstrap Failure:", err);
      }

      promptEl.focus();
      autoResize();
    })();
  </script>
</body>
</html>
